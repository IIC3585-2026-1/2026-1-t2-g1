<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AsyncAir Check-in</title>
    <link rel="stylesheet" href="styles/style.css">
    <script src="./checkIn.js" defer></script>
</head>
<body>

    <nav class="navbar">
        <div class="logo-container">
            <img src="styles/img/plane.png" alt="AsyncAir Logo" class="logo">
            <span class="brand-name">AsyncAir</span>
        </div>
    </nav>

    <main class="main-content">

        <!-- VISTA CHECK-IN -->
        <section id="checkin-view" class="checkin-container">
            <h1>Check-in</h1>
            
            <form class="input-group">
                <input type="text" id="input-id" placeholder="Ingrese su ID de usuario" class="user-input">
                <button type="button" class="submit-btn" onclick="iniciarCheckIn()">Ir</button>
            </form>

            <div id="logs-box" class="status-box"></div>
        </section>

        <!-- VISTA BOARDING PASS -->
        <section id="boarding-view" style="display: none;">
            
            <template id="boarding-template">
                <section class="boarding-card-frame">
                    <div class="boarding-pass-white">
                        <div class="pass-info">
                            <h2>Boarding pass</h2>
                            <div class="details">
                                <p>Pasajero: #<span class="pasajero"></span></p>
                                <p>Asiento: <span class="asiento"></span></p>
                                <p>Estado: LISTO PARA EMBARQUE</p>
                            </div>
                        </div>
                        
                        <div class="qr-code">
                            <img src="styles/img/QR.png" alt="Código QR" class="qr-image">
                        </div>
                    </div>
                </section>
            </template>

            <button onclick="volverAlCheckIn()" class="submit-btn">
                Volver
            </button>

        </section>

    </main>

</body>
</html>
